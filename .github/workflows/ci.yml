name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 16
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main"
          sudo apt-get update
          sudo apt-get install -y llvm-16-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install mqt.qcec

      - name: Configure
        run: cmake -B build -DLLVM_DIR=/usr/lib/llvm-16/lib/cmake/llvm

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: C++ Unit Tests (excluding full sweep)
        run: cd build && ctest -E QCVerificationTest --output-on-failure

      - name: CIQCVerification (passing-set synthesis)
        run: ./build/CIQCVerification --data-dir build/verification_data_ci

      - name: Strict equivalence verification
        run: python test/verify_circuits.py --strict build/verification_data_ci

      - name: Upload verification data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-verification-results
          path: |
            build/verification_data_ci/
          retention-days: 30
